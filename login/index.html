
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lakshiv. — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e0d;
    --bg2: #0f1412;
    --cyan: #00e5ff;
    --green: #00ff88;
    --white: #ffffff;
    --muted: #6b7c78;
    --border: rgba(0,229,255,0.15);
    --input-bg: rgba(255,255,255,0.04);
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 3rem;
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.5px;
    text-transform: none;
  }

  .nav-logo .brand-text { color: var(--cyan); }
  .nav-logo .dot { color: var(--white); font-weight: 900; }

  .nav-hint {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    position: relative;
    overflow: hidden;
  }

  /* Glow blobs */
  main::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
    top: -100px; right: -100px;
    pointer-events: none;
  }

  main::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,136,0.05) 0%, transparent 70%);
    bottom: -80px; left: -80px;
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 460px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3rem 2.5rem;
    position: relative;
    z-index: 1;
  }

  /* Top accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--green));
    border-radius: 4px 4px 0 0;
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 1rem;
  }

  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 42px;
    color: var(--white);
    line-height: 1;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .card-title span { color: var(--green); }

  .card-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 2.5rem;
    line-height: 1.5;
  }

  /* Fields */
  .field { margin-bottom: 1.25rem; }

  .field label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .forgot {
    font-size: 10px;
    color: var(--cyan);
    text-decoration: none;
    letter-spacing: 0.5px;
    text-transform: none;
    font-weight: 400;
    cursor: pointer;
  }
  .forgot:hover { text-decoration: underline; }

  .input-row {
    display: flex;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px;
    background: var(--input-bg);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--cyan);
  }

  .input-row input {
    flex: 1;
    height: 46px;
    border: none;
    background: transparent;
    padding: 0 14px;
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    color: var(--white);
    outline: none;
  }

  .input-row input::placeholder { color: rgba(255,255,255,0.2); }

  .domain-tag {
    display: flex;
    align-items: center;
    padding: 0 14px;
    font-size: 12px;
    color: rgba(0,229,255,0.5);
    border-left: 1px solid rgba(255,255,255,0.07);
    background: rgba(0,229,255,0.04);
    white-space: nowrap;
    user-select: none;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .error-msg {
    font-size: 11px;
    color: #ff4d6d;
    margin-top: 5px;
    display: none;
    letter-spacing: 0.3px;
  }

  /* Button */
  .btn {
    width: 100%;
    height: 50px;
    background: var(--cyan);
    color: #0a0e0d;
    border: none;
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 1.75rem;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: #33ecff; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn svg { width: 18px; height: 18px; stroke: #0a0e0d; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  /* Zoho badge */
  .zoho-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 1.75rem;
    padding-top: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .zoho-row span { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }
  .zoho-badge {
    font-size: 11px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 0.5px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(10,14,13,0.3); border-top-color: #0a0e0d; border-radius: 50%; animation: spin 0.7s linear infinite; }

  @media (max-width: 500px) {
    nav { padding: 1rem 1.5rem; }
    .card { padding: 2rem 1.5rem; }
    .card-title { font-size: 34px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><span class="brand-text">Lakshiv</span><span class="dot">.</span></div>
  <div class="nav-hint">Employee Mail Portal</div>
</nav>

<main>
  <div class="card">
    <div class="card-label">Employee Access</div>
    <div class="card-title">Sign <span>In.</span></div>
    <div class="card-sub">Enter your username to access your Lakshiv mailbox</div>

    <div class="field">
      <label>Username</label>
      <div class="input-row">
        <input type="text" id="username" placeholder="yourname" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false"/>
        <div class="domain-tag">@lakshiv.co.in</div>
      </div>
      <div class="error-msg" id="err-user">Please enter your username.</div>
    </div>

    <div class="field">
      <label>
        Password
        <span class="forgot" onclick="handleForgot()">Forgot password?</span>
      </label>
      <div class="input-row">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <div class="error-msg" id="err-pass">Please enter your password.</div>
    </div>

    <button class="btn" id="signinBtn" onclick="handleSignIn()">
      <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign In
    </button>

    <div class="zoho-row">
      <span>Secured &amp; powered by</span>
      <span class="zoho-badge">Zoho Mail</span>
    </div>
  </div>
</main>

<script>
  function handleSignIn() {
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errUser = document.getElementById('err-user');
    const errPass = document.getElementById('err-pass');
    const btn = document.getElementById('signinBtn');

    errUser.style.display = 'none';
    errPass.style.display = 'none';

    const username = usernameInput.value.trim();
    const password = passwordInput.value;
    let valid = true;

    if (!username) { errUser.style.display = 'block'; valid = false; }
    if (!password) { errPass.style.display = 'block'; valid = false; }
    if (!valid) return;

    // Auto-append domain
    const fullEmail = username + '@lakshiv.co.in';

    btn.innerHTML = '<div class="spinner"></div> SIGNING IN...';
    btn.disabled = true;
   
    setTimeout(() => {
      var zohoUrl = "https://accounts.zoho.in/oauth2/auth";
          zohoUrl += "?scope=ZohoMail.messages.ALL";
          zohoUrl += "&client_id=1000.SWV620CWZQ34M4839ONBWB4YR4K8GB";
          zohoUrl += "&response_type=code";
          zohoUrl += "&redirect_uri=https://login.lakshiv.co.in/login/callback";
          zohoUrl += "&login_hint=" + encodeURIComponent(fullEmail);
      window.location.href = zohoUrl;
    }, 1200);
  }
 
  function handleForgot() {
    const username = document.getElementById('username').value.trim();
    const email = username ? username + '@lakshiv.co.in' : '';
    alert(email ? `Password reset will be sent to:\n${email}` : 'Please enter your username first.');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignIn(); });
</script>

</body>
</html>
