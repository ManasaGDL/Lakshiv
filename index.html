<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lakshiv — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080c14; --surface: #0e1420; --border: rgba(0,200,255,0.12);
      --cyan: #00c8ff; --green: #00ff88; --white: #f0f4ff;
      --muted: #8a9bb8; --card-bg: rgba(14,20,32,0.9);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; z-index: 0; }
    .blob { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; z-index: 0; }
    .blob-1 { width: 500px; height: 500px; background: var(--cyan); top: -150px; right: -150px; }
    .blob-2 { width: 400px; height: 400px; background: var(--green); bottom: -100px; left: -150px; }

    .login-card {
      position: relative; z-index: 1;
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 3rem 2.5rem; width: 100%; max-width: 420px;
      box-shadow: 0 0 80px rgba(0,200,255,0.05);
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--cyan), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 0.4rem; }
    .logo span { color: var(--white); -webkit-text-fill-color: var(--white); }
    .login-subtitle { text-align: center; font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
    .divider { border: none; border-top: 1px solid var(--border); margin-bottom: 2rem; }

    .field { margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }

    .input-group { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 8px; background: rgba(0,0,0,0.3); overflow: hidden; transition: border-color 0.2s; }
    .input-group:focus-within { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,200,255,0.08); }
    .input-group input { flex: 1; background: transparent; border: none; outline: none; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 1rem; padding: 0.85rem 1rem; }
    .input-group input::placeholder { color: var(--muted); }
    .input-suffix { padding: 0.85rem 1rem; font-size: 0.88rem; color: var(--muted); background: rgba(0,200,255,0.04); border-left: 1px solid var(--border); white-space: nowrap; user-select: none; }



    .email-preview { font-size: 0.78rem; color: var(--cyan); margin-top: 0.4rem; min-height: 1rem; padding-left: 0.2rem; }

    .btn-login { width: 100%; background: linear-gradient(135deg, var(--cyan), var(--green)); color: var(--bg); border: none; padding: 0.9rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 1rem; cursor: pointer; transition: opacity 0.2s, transform 0.2s; margin-top: 0.5rem; }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .login-footer { text-align: center; margin-top: 1.5rem; font-size: 0.76rem; color: var(--muted); line-height: 1.6; }
    .back-link { display: block; text-align: center; margin-top: 1rem; font-size: 0.8rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: var(--white); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-card">
    <div class="logo">Lakshiv<span>.</span></div>
    <p class="login-subtitle">Sign in to your workspace</p>
    <hr class="divider"/>

    <!-- USERNAME -->
    <div class="field">
      <label for="username">Username</label>
      <div class="input-group">
        <input type="text" id="username" placeholder="e.g. john" autocomplete="off" autocapitalize="none" spellcheck="false" oninput="updatePreview()" onkeydown="if(event.key==='Enter') handleLogin()"/>
        <div class="input-suffix">@lakshiv.co.in</div>
      </div>
      <div class="email-preview" id="emailPreview"></div>
    </div>



    <button class="btn-login" id="loginBtn" onclick="handleLogin()" disabled>Sign In →</button>

    <div class="login-footer">
      You'll be redirected to Zoho Mail and signed in as<br/>
      <span id="footerEmail" style="color:var(--cyan);">username@lakshiv.co.in</span>
    </div>

    <a href="index.html" class="back-link">← Back to Lakshiv.co.in</a>
  </div>

  <script>
    function updatePreview() {
      const input = document.getElementById('username').value.trim();
      const username = input.replace(/@.*$/, '');
      const preview = document.getElementById('emailPreview');
      const btn = document.getElementById('loginBtn');
      const footer = document.getElementById('footerEmail');

      if (username.length > 0) {
        const fullEmail = username + '@lakshiv.co.in';
        preview.textContent = '→ ' + fullEmail;
        footer.textContent = fullEmail;
        btn.disabled = false;
        btn.textContent = 'Sign In as ' + fullEmail + ' →';
      } else {
        preview.textContent = '';
        footer.textContent = 'username@lakshiv.co.in';
        btn.disabled = true;
        btn.textContent = 'Sign In →';
      }
    }

    function handleLogin() {
      const input = document.getElementById('username').value.trim();
      if (!input) return;

      const username = input.replace(/@.*$/, '');
      const fullEmail = username + '@lakshiv.co.in';

      const zohoUrl = 'https://accounts.zoho.in/signin?servicename=ZohoMail&signupurl=https://www.zoho.com/mail/&username=' + encodeURIComponent(fullEmail);
      window.location.href = zohoUrl;
    }
  </script>
</body>
</html>
